<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .container {
    background: white;
    border-radius: 15px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 40px;
    max-width: 500px;
    width: 100%;
  }
  
  h1 {
    color: #333;
    margin-bottom: 10px;
    text-align: center;
    font-size: 28px;
  }
  
  .stats {
    display: flex;
    justify-content: space-around;
    background: #f5f5f5;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    text-align: center;
  }
  
  .stat-item {
    flex: 1;
  }
  
  .stat-label {
    color: #999;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .stat-value {
    color: #667eea;
    font-size: 24px;
    font-weight: bold;
    margin-top: 5px;
  }
  
  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  
  input[type="text"] {
    flex: 1;
    padding: 12px 15px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.3s ease;
  }
  
  input[type="text"]:focus {
    outline: none;
    border-color: #667eea;
  }
  
  button {
    padding: 12px 25px;
    background-color: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  
  button:hover {
    background-color: #5568d3;
    transform: translateY(-2px);
  }
  
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  
  .filter-btn {
    padding: 8px 15px;
    background-color: #f5f5f5;
    color: #666;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  
  .filter-btn:hover {
    background-color: #eee;
  }
  
  .filter-btn.active {
    background-color: #667eea;
    color: white;
    border-color: #667eea;
  }
  
  .tasks-list {
    max-height: 400px;
    overflow-y: auto;
  }
  
  .task-item {
    display: flex;
    align-items: center;
    padding: 15px;
    background: #f9f9f9;
    border-radius: 8px;
    margin-bottom: 10px;
    transition: all 0.3s ease;
    border-left: 4px solid #667eea;
  }
  
  .task-item:hover {
    background: #f5f5f5;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
  }
  
  .task-item.completed {
    opacity: 0.6;
    border-left-color: #4caf50;
  }
  
  .task-item.completed .task-text {
    text-decoration: line-through;
    color: #999;
  }
  
  .task-checkbox {
    width: 20px;
    height: 20px;
    margin-right: 15px;
    cursor: pointer;
    accent-color: #667eea;
  }
  
  .task-text {
    flex: 1;
    color: #333;
    font-size: 14px;
  }
  
  .task-date {
    color: #999;
    font-size: 11px;
    margin-right: 10px;
  }
  
  .delete-btn {
    padding: 6px 12px;
    background-color: #ff6b6b;
    font-size: 12px;
    border-radius: 5px;
  }
  
  .delete-btn:hover {
    background-color: #ff5252;
  }
  
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #999;
  }
  
  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 10px;
  }
  
  .clear-all-btn {
    width: 100%;
    background-color: #ff9800;
    margin-top: 20px;
  }
  
  .clear-all-btn:hover {
    background-color: #f57c00;
  }
  
  @media (max-width: 600px) {
    .container {
      padding: 20px;
    }
    
    h1 {
      font-size: 22px;
    }
    
    .stats {
      flex-direction: row;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>📝 My To-Do List</h1>
  
  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="total-tasks">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Completed</div>
      <div class="stat-value" id="completed-tasks">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Remaining</div>
      <div class="stat-value" id="remaining-tasks">0</div>
    </div>
  </div>
  
  <div class="input-group">
    <input type="text" id="task-input" placeholder="Add a new task..." />
    <button id="add-btn">Add</button>
  </div>
  
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>
  
  <div class="tasks-list" id="tasks-list"></div>
  
  <button class="clear-all-btn" id="clear-all-btn">Clear Completed</button>
</div>

<script src="todo.js"></script>

</body>
</html>
