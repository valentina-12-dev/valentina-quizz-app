<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .container {
    background: white;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    padding: 40px;
    max-width: 600px;
    width: 100%;
  }
  
  h1 {
    color: #333;
    margin-bottom: 10px;
    text-align: center;
  }
  
  .quiz-info {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
    font-size: 14px;
  }
  
  .question {
    margin-bottom: 30px;
  }
  
  .question h2 {
    color: #667eea;
    font-size: 18px;
    margin-bottom: 20px;
  }
  
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .option {
    display: flex;
    align-items: center;
    padding: 15px;
    border: 2px solid #ddd;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .option:hover {
    border-color: #667eea;
    background-color: #f5f5f5;
  }
  
  .option input[type="radio"] {
    margin-right: 15px;
    cursor: pointer;
  }
  
  .option label {
    cursor: pointer;
    flex: 1;
  }
  
  .buttons {
    display: flex;
    gap: 10px;
    margin-top: 30px;
    justify-content: center;
  }
  
  button {
    padding: 12px 30px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .btn-next {
    background-color: #667eea;
    color: white;
  }
  
  .btn-next:hover {
    background-color: #5568d3;
  }
  
  .btn-next:disabled {
    background-color: #ccc;
    cursor: not-allowed;
  }
  
  .btn-restart {
    background-color: #764ba2;
    color: white;
  }
  
  .btn-restart:hover {
    background-color: #653a8a;
  }
  
  .results {
    text-align: center;
    display: none;
  }
  
  .results h2 {
    color: #333;
    font-size: 24px;
    margin-bottom: 20px;
  }
  
  .score {
    font-size: 48px;
    color: #667eea;
    font-weight: bold;
    margin: 20px 0;
  }
  
  .progress-bar {
    width: 100%;
    height: 6px;
    background-color: #ddd;
    border-radius: 3px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  
  .progress-fill {
    height: 100%;
    background-color: #667eea;
    transition: width 0.3s ease;
  }
</style>
</head>
<body>

<div class="container">
  <div id="quiz-container">
    <h1>Quiz-ul meu</h1>
    <div class="quiz-info" id="quiz-info"></div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="questions-container"></div>
    <div class="buttons">
      <button class="btn-next" id="btn-next">Următoarea</button>
    </div>
  </div>
  
  <div class="results" id="results">
    <h2>Felicitări! 🎉</h2>
    <p>Ai terminat quiz-ul!</p>
    <div class="score" id="final-score"></div>
    <button class="btn-restart" id="btn-restart-final">Încearcă din nou</button>
  </div>
</div>

<script src="quiz.js"></script>

</body>
</html>
