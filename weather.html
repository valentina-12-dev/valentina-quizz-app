<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
  }
  
  .container {
    max-width: 1000px;
    margin: 0 auto;
  }
  
  .header {
    text-align: center;
    color: white;
    margin-bottom: 30px;
  }
  
  .header h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }
  
  .search-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  
  .search-box input {
    flex: 1;
    min-width: 200px;
    padding: 12px 15px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.3s ease;
  }
  
  .search-box input:focus {
    outline: none;
    border-color: #667eea;
  }
  
  .search-box button {
    padding: 12px 25px;
    background-color: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  
  .search-box button:hover {
    background-color: #5568d3;
    transform: translateY(-2px);
  }
  
  .unit-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 24px;
  }
  
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: 0.4s;
    border-radius: 24px;
  }
  
  .slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: 0.4s;
    border-radius: 50%;
  }
  
  input:checked + .slider {
    background-color: #667eea;
  }
  
  input:checked + .slider:before {
    transform: translateX(26px);
  }
  
  .current-weather {
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    margin-bottom: 20px;
  }
  
  .location {
    margin-bottom: 20px;
  }
  
  .location h2 {
    color: #333;
    font-size: 28px;
    margin-bottom: 5px;
  }
  
  .location p {
    color: #999;
    font-size: 14px;
  }
  
  .weather-main {
    display: flex;
    align-items: center;
    margin: 30px 0;
  }
  
  .weather-icon {
    font-size: 100px;
    margin-right: 30px;
  }
  
  .temperature {
    font-size: 56px;
    font-weight: bold;
    color: #667eea;
  }
  
  .weather-details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 2px solid #f0f0f0;
  }
  
  .detail {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
  }
  
  .detail .label {
    color: #999;
    font-weight: bold;
  }
  
  .detail .value {
    color: #333;
    font-weight: bold;
  }
  
  .forecast {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
  }
  
  .forecast-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
  }
  
  .forecast-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
  }
  
  .day-name {
    color: #667eea;
    font-weight: bold;
    margin-bottom: 10px;
  }
  
  .forecast-icon {
    font-size: 48px;
    margin: 10px 0;
  }
  
  .temp-range {
    color: #333;
    font-weight: bold;
    margin-bottom: 5px;
  }
  
  .precipitation {
    color: #999;
    font-size: 12px;
  }
  
  @media (max-width: 768px) {
    .search-box {
      flex-direction: column;
    }
    
    .search-box input {
      width: 100%;
    }
    
    .search-box button {
      width: 100%;
    }
    
    .weather-main {
      flex-direction: column;
      text-align: center;
    }
    
    .weather-icon {
      margin-right: 0;
      margin-bottom: 20px;
    }
    
    .temperature {
      font-size: 42px;
    }
    
    .forecast {
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🌍 Weather Dashboard</h1>
    <p>Real-time weather forecast for any city</p>
  </div>
  
  <div class="search-box">
    <input type="text" id="city-input" placeholder="Search for a city..." />
    <button id="search-btn">Search</button>
    <button id="location-btn">📍 My Location</button>
    <div class="unit-toggle">
      <label for="unit-toggle">°C / °F</label>
      <label class="switch">
        <input type="checkbox" id="unit-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <div class="current-weather" id="current-weather">
    <p style="text-align: center; color: #999;">Loading weather data...</p>
  </div>
  
  <h3 style="color: white; margin-bottom: 15px;">📅 7-Day Forecast</h3>
  <div class="forecast" id="forecast"></div>
</div>

<script src="weather.js"></script>

</body>
</html>
