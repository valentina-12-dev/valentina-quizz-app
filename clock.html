<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Clock - Multiple Timezones</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .container {
    max-width: 1200px;
    width: 100%;
  }
  
  h1 {
    text-align: center;
    color: white;
    margin-bottom: 40px;
    font-size: 32px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  
  .clocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .clock-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    padding: 30px;
    text-align: center;
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  }
  
  .clock-card:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.4);
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
  }
  
  .timezone-name {
    color: #64b5f6;
    font-size: 14px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .city-name {
    color: white;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
  }
  
  .time {
    color: #ffd54f;
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(255, 213, 79, 0.3);
  }
  
  .date {
    color: #b3e5fc;
    font-size: 12px;
  }
  
  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 30px;
  }
  
  button {
    padding: 12px 25px;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  button:hover {
    background: rgba(255, 255, 255, 0.3);
    border-color: rgba(255, 255, 255, 0.5);
    transform: scale(1.05);
  }
  
  .format-toggle {
    display: flex;
    gap: 5px;
    justify-content: center;
  }
  
  .format-btn {
    padding: 8px 15px;
    font-size: 12px;
  }
  
  .format-btn.active {
    background: rgba(255, 213, 79, 0.3);
    border-color: #ffd54f;
  }
  
  @media (max-width: 768px) {
    .clocks-grid {
      grid-template-columns: 1fr;
    }
    
    h1 {
      font-size: 24px;
    }
    
    .time {
      font-size: 36px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>⏰ Digital Clock - Multiple Timezones</h1>
  
  <div class="clocks-grid" id="clocks-grid"></div>
  
  <div class="controls">
    <div class="format-toggle">
      <button class="format-btn active" id="btn-24h">24 Hour</button>
      <button class="format-btn" id="btn-12h">12 Hour</button>
    </div>
  </div>
</div>

<script src="clock.js"></script>

</body>
</html>
