<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Drept Administrativ</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .container {
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 40px;
    max-width: 700px;
    width: 100%;
  }
  
  h1 {
    text-align: center;
    color: #333;
    margin-bottom: 10px;
    font-size: 28px;
  }
  
  .subtitle {
    text-align: center;
    color: #999;
    margin-bottom: 30px;
    font-size: 14px;
  }
  
  .quiz-container {
    display: none;
  }
  
  .quiz-container.active {
    display: block;
  }
  
  .progress {
    background: #ddd;
    height: 8px;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  
  .progress-bar {
    background: #667eea;
    height: 100%;
    transition: width 0.3s ease;
  }
  
  .question-number {
    color: #999;
    font-size: 14px;
    margin-bottom: 10px;
  }
  
  .question {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 16px;
    color: #333;
    line-height: 1.6;
  }
  
  .options {
    display: grid;
    gap: 10px;
    margin-bottom: 20px;
  }
  
  .option {
    padding: 15px;
    background: #f9f9f9;
    border: 2px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 15px;
  }
  
  .option:hover {
    background: #f0f0f0;
    border-color: #667eea;
  }
  
  .option.selected {
    background: #667eea;
    color: white;
    border-color: #667eea;
  }
  
  .option.correct {
    background: #4caf50;
    color: white;
    border-color: #4caf50;
  }
  
  .option.incorrect {
    background: #f44336;
    color: white;
    border-color: #f44336;
  }
  
  .buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  
  button {
    padding: 12px 30px;
    background-color: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  
  button:hover {
    background-color: #5568d3;
    transform: translateY(-2px);
  }
  
  button:disabled {
    background-color: #ccc;
    cursor: not-allowed;
    transform: none;
  }
  
  .results {
    text-align: center;
    display: none;
  }
  
  .results.active {
    display: block;
  }
  
  .score {
    font-size: 48px;
    color: #667eea;
    margin: 20px 0;
    font-weight: bold;
  }
  
  .score-text {
    font-size: 18px;
    color: #666;
    margin-bottom: 20px;
  }
  
  .start-screen {
    text-align: center;
    display: block;
  }
  
  .start-screen.hidden {
    display: none;
  }
  
  .start-screen h2 {
    color: #667eea;
    margin-bottom: 20px;
    font-size: 24px;
  }
  
  .start-screen p {
    color: #666;
    margin-bottom: 30px;
    font-size: 16px;
  }
  
  .start-btn {
    padding: 15px 40px;
    background-color: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  
  .start-btn:hover {
    background-color: #5568d3;
    transform: scale(1.05);
  }
  
  @media (max-width: 600px) {
    .container {
      padding: 20px;
    }
    
    h1 {
      font-size: 22px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>📚 Quiz Drept Administrativ</h1>
  <p class="subtitle">100 întrebări de testare</p>
  
  <div class="start-screen" id="startScreen">
    <h2>Bine ai venit!</h2>
    <p>Vei răspunde la 100 de întrebări din domeniul Dreptului Administrativ.</p>
    <p style="color: #999; font-size: 14px;">⏱️ Fiecare întrebare are o singură răspuns corect.</p>
    <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
  </div>
  
  <div class="quiz-container" id="quizContainer">
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <div class="question-number" id="questionNumber"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    
    <div class="buttons">
      <button id="nextBtn" onclick="nextQuestion()" disabled>Următoarea</button>
    </div>
  </div>
  
  <div class="results" id="results">
    <h2>Quiz Completat! 🎉</h2>
    <div class="score" id="finalScore"></div>
    <div class="score-text" id="scoreText"></div>
    <button onclick="restartQuiz()">Încearcă din nou</button>
  </div>
</div>

<script>

    { question: "Ordonanțele de urgență se emit:", options: ["Numai în perioada vacanței parlamentare", "În situații extraordinare a căror reglementare nu poate fi amânată", "Numai cu aprobarea CCR", "Exclusiv în domeniul legilor organice"], correct: 1 },
    { question: "Constituția României reprezintă:", options: ["Izvor indirect al dreptului administrativ", "Cel mai important izvor al dreptului administrativ", "Act administrativ individual", "Act emis de Guvern"], correct: 1 },
    { question: "Legea fundamentală a statului român este:", options: ["Codul Administrativ", "Constituția", "Legea contenciosului administrativ", "Codul Civil"], correct: 1 },
    { question: "Controlul asupra constituționalității legilor este realizat de:", options: ["Guvern", "Înalta Curte de Casație și Justiție", "Curtea Constituțională", "Parlament"], correct: 2 },
    { question: "Curtea Constituțională este alcătuită din:", options: ["7 judecători", "9 judecători", "11 judecători", "15 judecători"], correct: 1 },
    { question: "Președintele României numește în CCR:", options: ["2 judecători", "3 judecători", "4 judecători", "5 judecători"], correct: 1 },
    { question: "Curtea de Conturi verifică:", options: ["Constituționalitatea legilor", "Legalitatea hotărârilor judecătorești", "Modul de administrare a resurselor financiare publice", "Organizarea alegerilor"], correct: 2 },
    { question: "Prefectul este:", options: ["Autoritate autonomă locală", "Reprezentantul Guvernului în teritoriu", "Membru al Consiliului Local", "Autoritate judecătorească"], correct: 1 },
    { question: "Primarul este:", options: ["Autoritate autonomă locală", "Autoritate centrală autonomă", "Autoritate judecătorească", "Organ al Guvernului"], correct: 0 },
    { question: "Consiliul Județean face parte din:", options: ["Administrația publică centrală", "Administrația publică locală", "Puterea judecătorească", "Autoritățile autonome centrale"], correct: 1 },
    { question: "Serviciul public urmărește:", options: ["Interesul privat", "Interesul public", "Interesul comercial", "Interesul electoral"], correct: 1 },
    { question: "Caracterul continuu al serviciului public presupune:", options: ["Funcționare ocazională", "Funcționare repetată și constantă", "Funcționare exclusiv online", "Funcționare doar în zilele lucrătoare"], correct: 1 },
    { question: "Adaptabilitatea serviciului public înseamnă:", options: ["Menținerea acelorași proceduri indiferent de context", "Posibilitatea de a se adapta realităților sociale", "Reducerea numărului de beneficiari", "Desființarea serviciului"], correct: 1 },
    { question: "Instituțiile de utilitate publică sunt finanțate în principal:", options: ["Exclusiv de Guvern", "Din surse private precum taxe și donații", "Exclusiv de consiliile locale", "Exclusiv din fonduri europene"], correct: 1 },
    { question: "O universitate privată reprezintă:", options: ["Instituție publică", "Instituție de utilitate publică", "Autoritate publică", "Autoritate autonomă"], correct: 1 },
    { question: "O universitate de stat reprezintă:", options: ["Instituție de utilitate publică", "Instituție publică", "Autoritate autonomă", "Autoritate constituțională"], correct: 1 },
    { question: "Interesul public cuprinde:", options: ["Exclusiv necesități economice", "Necesități materiale și spirituale", "Exclusiv necesități spirituale", "Exclusiv interese politice"], correct: 1 },
    { question: "Reabilitarea unei școli reprezintă:", options: ["Necesitate spirituală", "Necesitate materială de interes public", "Act jurisdicțional", "Interes privat"], correct: 1 },
    { question: "Biblioteca publică este un exemplu de:", options: ["Necesitate spirituală de interes public", "Necesitate materială de interes public", "Act administrativ individual", "Autoritate publică"], correct: 0 },
    { question: "În cadrul raporturilor de drept administrativ, cetățeanul se află:", options: ["Întotdeauna pe poziție superioară autorității", "În raport de subordonare față de autoritatea publică", "În afara raportului juridic", "Pe poziție identică Parlamentului"], correct: 1 },
    { question: "Una dintre cele mai importante trăsături ale dreptului administrativ este:", options: ["Protejarea interesului privat", "Regimul de putere publică", "Lipsa constrângerii statului", "Egalitatea absolută a părților"], correct: 1 }
  ];
  
  let currentQuestion = 0;
  let score = 0;
  let selectedAnswer = null;
  let answered = false;
  
  function startQuiz() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('quizContainer').classList.add('active');
    loadQuestion();
  }
  
  function loadQuestion() {
    const question = quizData[currentQuestion];
    document.getElementById('questionNumber').innerText = `Întrebarea ${currentQuestion + 1} din ${quizData.length}`;
    document.getElementById('question').innerText = question.question;
    
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    
    const optionLetters = ['A', 'B', 'C', 'D'];
    question.options.forEach((option, index) => {
      const btn = document.createElement('div');
      btn.className = 'option';
      btn.innerText = optionLetters[index] + ') ' + option;
      btn.onclick = () => selectOption(index);
      optionsDiv.appendChild(btn);
    });
    
    updateProgressBar();
    answered = false;
    selectedAnswer = null;
    document.getElementById('nextBtn').disabled = true;
  }
  
  function selectOption(index) {
    if (answered) return;
    
    selectedAnswer = index;
    answered = true;
    
    const options = document.querySelectorAll('.option');
    const correctAnswer = quizData[currentQuestion].correct;
    
    options.forEach((option, i) => {
      if (i === correctAnswer) {
        option.classList.add('correct');
      } else if (i === selectedAnswer && i !== correctAnswer) {
        option.classList.add('incorrect');
      }
      option.style.pointerEvents = 'none';
    });
    
    if (selectedAnswer === correctAnswer) {
      score++;
    }
    
    document.getElementById('nextBtn').disabled = false;
  }
  
  function nextQuestion() {
    currentQuestion++;
    
    if (currentQuestion < quizData.length) {
      loadQuestion();
    } else {
      showResults();
    }
  }
  
  function updateProgressBar() {
    const progress = ((currentQuestion + 1) / quizData.length) * 100;
    document.getElementById('progressBar').style.width = progress + '%';
  }
  
  function showResults() {
    document.getElementById('quizContainer').classList.remove('active');
    document.getElementById('results').classList.add('active');
    
    const percentage = (score / quizData.length) * 100;
    document.getElementById('finalScore').innerText = `${score} / ${quizData.length}`;
    
    let message = '';
    if (percentage === 100) {
      message = 'Perfect! Cunoști Dreptul Administrativ la perfecție! 🧠';
    } else if (percentage >= 90) {
      message = 'Excelent! Performanță remarcabilă! 👏';
    } else if (percentage >= 80) {
      message = 'Foarte bine! Ai o cunoaștere solidă! 📚';
    } else if (percentage >= 70) {
      message = 'Bine! Continua să studiezi! 💪';
    } else if (percentage >= 60) {
      message = 'Acceptabil! Mai sunt lucruri de învățat! 📖';
    } else if (percentage >= 50) {
      message = 'Revin! Încearcă din nou! 🎯';
    } else {
      message = 'Keep practicing! 🚀';
    }
    
    document.getElementById('scoreText').innerText = `${Math.round(percentage)}% - ${message}`;
  }
  
  function restartQuiz() {
    currentQuestion = 0;
    score = 0;
    selectedAnswer = null;
    answered = false;
    
    document.getElementById('startScreen').classList.remove('hidden');
    document.getElementById('results').classList.remove('active');
    document.getElementById('quizContainer').classList.remove('active');
  }
</script>
